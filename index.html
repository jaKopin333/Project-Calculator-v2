<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light To Dark Calculator</title>
    <link rel="stylesheet" href="style.css">
    <!-- Fonts below -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Lekton:ital,wght@0,400;0,700;1,400&family=Manrope:wght@200..800&family=Noto+Sans+Mono:wght@100..900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Saira:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

      <!-- Theme Toggle & History Toogle -->
     <div class="top-controls">
        <button id="historyToggle" class="controlBtn" aria-label="View History">
            <span class="toggleIcon">📃</span>
        </button>

        <button id="themeToggle" class="controlBtn" aria-label="Toggle Theme">
            <span class="toggleIcon">🌙</span>
        </button>
     </div>
    <!--Main functions & Styling -->
    <div id="calculator">
    <!--display results & functional buttons-->   
     <input id="display" readonly>
     <div class="sigil">✦</div>
     <!--Buttons-->
     <div id="calButtons"></div>
        </div>
    <!--History sidebar-->
    <div id="historySidebar" class="historySidebar">
        <div class="history-header">
            <h3>History</h3>
            <button id="closeHistory" class="closeBtn">⤬</button>
        </div>
        <!--Store list of inputs-->
        <div id="historyList" class="historyList">
            <!-- History items appear here -->
             <div id="historyItems" class="historyItems"></div>
             <div class="historyPlaceholder">No calculations yet!</div>
        </div>
        <button id="clearHistory" class="clearHistoryBtn">Clear History</button>
    </div>
    

    <script src="main.js"></script>
    
</body>
</html>
